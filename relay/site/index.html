<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Context Guardian</title>
  <style>
    :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b1020; color: #e8edf7; }
    main { width: min(42rem, calc(100% - 3rem)); }
    h1 { margin: 0 0 1rem; font-size: clamp(2.2rem, 7vw, 4.8rem); letter-spacing: -0.05em; }
    p { max-width: 36rem; color: #aebbd0; font-size: 1.1rem; line-height: 1.7; }
    a { color: #8cc8ff; }
  </style>
</head>
<body>
  <main>
    <h1>Context Guardian</h1>
    <p>Reliable context recovery and image relay infrastructure for AI coding sessions.</p>
    <p><a href="https://github.com/shangshang0/context-guardian">View the open-source project</a></p>
  </main>
</body>
</html>
