services:
  relay:
    build: .
    restart: unless-stopped
    read_only: true
    user: "65532:65532"
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 128
    mem_limit: 256m
    cpus: 1.0
    tmpfs:
      - /tmp:size=16m,mode=1777
    expose:
      - "8080"
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "2"
  https:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    read_only: true
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 64
    mem_limit: 96m
    cpus: 0.5
    depends_on: ["relay"]
    environment:
      CONTEXT_RELAY_DOMAIN: ${CONTEXT_RELAY_DOMAIN:?set CONTEXT_RELAY_DOMAIN}
      CONTEXT_RELAY_ACME_EMAIL: ${CONTEXT_RELAY_ACME_EMAIL:?set CONTEXT_RELAY_ACME_EMAIL}
    ports:
      - "80:80"
      - "5003:443"
      - "5004:443"
    tmpfs:
      - /config:size=8m,mode=0700
      - /tmp:size=8m,mode=1777
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - relay-caddy-data:/data
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  relay-caddy-data:
