name: context-guardian-release

on:
  push:
    tags: ["context-guardian-v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, archive: tar.gz }
          - { os: macos-13, target: x86_64-apple-darwin, archive: tar.gz }
          - { os: macos-14, target: aarch64-apple-darwin, archive: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, archive: zip }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - shell: bash
        run: |
          mkdir -p dist/context-guardian
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/context-guardian.exe" dist/context-guardian/
            cp "target/${{ matrix.target }}/release/context-image-gateway.exe" dist/context-guardian/
          else
            cp "target/${{ matrix.target }}/release/context-guardian" dist/context-guardian/
            cp "target/${{ matrix.target }}/release/context-image-gateway" dist/context-guardian/
          fi
          cp -R mcp skill scripts README.md LICENSE dist/context-guardian/
      - shell: bash
        run: |
          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "context-guardian-${{ matrix.target }}.zip" context-guardian
          else
            tar -czf "context-guardian-${{ matrix.target }}.tar.gz" context-guardian
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: context-guardian-${{ matrix.target }}
          path: dist/context-guardian-${{ matrix.target }}.*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with: { files: "dist/*", generate_release_notes: true }
